<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" rx="60" fill="url(#bgGrad)"/>
  <g transform="translate(200,160)" filter="url(#glow)">
    <polygon points="0,-80 30,-20 -10,-20 15,70 -35,0 5,0 -20,-80" fill="url(#boltGrad)"/>
  </g>
  <text x="200" y="275" font-family="'Segoe UI','Arial',sans-serif" font-size="52" font-weight="800" fill="#e0e7ff" text-anchor="middle" letter-spacing="6">CALOAD</text>
  <text x="200" y="315" font-family="'Segoe UI','Arial',sans-serif" font-size="16" fill="#a5b4fc" text-anchor="middle" letter-spacing="3">TẢI NHANH • NÉN VIDEO</text>
  <line x1="120" y1="340" x2="280" y2="340" stroke="#4338ca" stroke-width="2" stroke-linecap="round"/>
</svg>
